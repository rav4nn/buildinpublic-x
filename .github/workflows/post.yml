name: Post Scheduled Tweets

on:
  schedule:
    - cron: "1 * * * *"   # Every hour at :01 past
  workflow_dispatch:        # Also allow manual trigger

jobs:
  post:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate daily digest (skips if digest_days interval hasn't elapsed)
        run: npm run digest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Post due tweets
        run: npm run post
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}

      - name: Deploy schedule
        run: npm run deploy

      - name: Update status
        run: npm run status

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git pull --rebase --autostash origin ${{ github.ref_name }}
          git add \
            schedule-twitter.txt \
            STATUS.md \
            "*/*-tweets.txt" \
            "*/*-posted.txt" || true
          git diff --staged --quiet && echo "Nothing to commit" || \
            git commit -m "chore: post scheduled tweets [skip ci]"
          git push origin ${{ github.ref_name }}
