github_owner: "your-github-username"

# Repos to monitor for daily digest (npm run digest)
# Each day's commits across these repos become a thread
tracked_repos:
  - your-repo-name
  # - another-repo

platforms:                  # Which platforms to post to
  - bluesky                 # free (requires BLUESKY_IDENTIFIER + BLUESKY_APP_PASSWORD)
  # - x                     # paid — $0.01/tweet (requires X_API_KEY etc.)

timezone: "GMT+0"          # Your local timezone offset, e.g. "GMT+5:30" or "GMT-8"
llm_provider: "anthropic"  # anthropic | openai | gemini | deepseek | groq
thread_followup: true
thread_followup_text: "~ posted using github.com/rav4nn/buildinpublic-x"
auto_generate: false        # set true to auto-pick up new commits 4x/day via GitHub Actions
paused: false               # kill switch — set true + run: npm run deploy to stop all tweets

post_times:                 # When to post each day (your local timezone). Pick up to 8.
  - "09:00"
  - "13:00"
  - "17:00"
  - "21:00"
  # - "07:00"
  # - "11:00"
  # - "15:00"
  # - "23:00"
